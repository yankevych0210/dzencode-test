version: '3.8'

services:
  backend:
    build: ./server
    container_name: inventory-backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
    restart: unless-stopped

  frontend:
    build:
      context: ./client
      args:
        - REACT_APP_API_URL=http://localhost/api
    container_name: inventory-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
